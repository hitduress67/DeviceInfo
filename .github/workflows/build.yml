name: Build Android APK

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-arm64-v8a-release-unsigned.apk SysInfo-Dashboard-arm64-v8a.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk SysInfo-Dashboard-arm64-v8a.apk 2>/dev/null || \
          find app/build/outputs -name "*.apk" -exec cp {} SysInfo-Dashboard-arm64-v8a.apk \; 2>/dev/null || true
          ls -la *.apk 2>/dev/null

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SysInfo-Dashboard-APK
          path: SysInfo-Dashboard-arm64-v8a.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: SysInfo-Dashboard-arm64-v8a.apk
          generate_release_notes: true
